<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>팀장 회원가입 | MaRu Partner Admin</title>
    <link rel="stylesheet" href="./styles.css?v=8" />
  </head>
  <body class="register-page">
    <main class="signup-shell">
      <section class="signup-panel">
        <div class="brand-lockup">
          <div class="brand-mark">M</div>
          <div>
            <p class="eyebrow">팀장 회원가입</p>
            <h1>MaRu Partner Admin</h1>
          </div>
        </div>

        <div class="form-summary-card">
          <strong>팀장 계정 신청</strong>
          <p>소속 사업단을 선택하고 필수 약관에 동의하면 관리자 하위 파트너 계정으로 등록됩니다.</p>
        </div>

        <form id="salesRegisterForm" class="login-form">
          <label>
            소속 사업단
            <select id="salesCenterUid" required>
              <option value="">사업단을 선택해주세요</option>
            </select>
          </label>
          <label>
            아이디
            <input id="salesUsername" type="text" autocomplete="username" required />
          </label>
          <label>
            비밀번호
            <input id="salesPassword" type="password" autocomplete="new-password" required />
          </label>
          <label>
            이름
            <input id="salesName" type="text" autocomplete="name" required />
          </label>
          <label>
            연락처
            <input id="salesPhone" type="tel" autocomplete="tel" required />
          </label>
          <label>
            이메일
            <input id="salesEmail" type="email" autocomplete="email" />
          </label>

          <div class="agreement-box">
            <div id="salesActiveTermsList" class="terms-preview-list">
              <div class="form-note">약관을 불러오는 중입니다.</div>
            </div>
            <label class="check-label">
              <input id="salesAgreeTerms" type="checkbox" required />
              파트너 이용약관에 동의합니다.
            </label>
            <label class="check-label">
              <input id="salesAgreePrivacy" type="checkbox" required />
              개인정보 수집 및 이용에 동의합니다.
            </label>
            <label class="check-label">
              <input id="salesAgreeMarketing" type="checkbox" />
              마케팅 수신에 동의합니다.
            </label>
          </div>

          <button class="primary-button" type="submit">회원가입</button>
          <p id="salesRegisterMessage" class="form-note">가입한 팀장은 선택한 사업단 밑으로 등록됩니다.</p>
          <a class="form-link" href="./login.html">로그인으로 돌아가기</a>
        </form>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./config.js?v=8"></script>
    <script src="./api.js?v=8"></script>
    <script src="./register.js?v=8"></script>
  </body>
</html>
