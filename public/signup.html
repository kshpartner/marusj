<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상조 가입 약관서 | MaRu Partner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="signup-shell">
      <section class="signup-panel">
        <div class="brand-lockup">
          <div class="brand-mark">M</div>
          <div>
            <p class="eyebrow">상조 가입 약관서</p>
            <h1>MaRu Partner</h1>
          </div>
        </div>

        <form id="signupForm" class="login-form">
          <label>
            상위 UID
            <input id="signupRefUid" type="text" readonly />
          </label>
          <label>
            이름
            <input id="signupName" type="text" autocomplete="name" required />
          </label>
          <label>
            연락처
            <input id="signupPhone" type="tel" autocomplete="tel" required />
          </label>
          <label>
            이메일
            <input id="signupEmail" type="email" autocomplete="email" />
          </label>

          <div class="agreement-box">
            <div id="activeTermsList" class="terms-preview-list">
              <div class="form-note">약관을 불러오는 중입니다.</div>
            </div>
            <label class="check-label">
              <input id="agreeTerms" type="checkbox" required />
              상조 서비스 이용약관에 동의합니다.
            </label>
            <label class="check-label">
              <input id="agreePrivacy" type="checkbox" required />
              개인정보 수집 및 이용에 동의합니다.
            </label>
            <label class="check-label">
              <input id="agreeMarketing" type="checkbox" />
              마케팅 수신에 동의합니다.
            </label>
          </div>

          <button class="primary-button" type="submit">상조 가입 신청</button>
          <p id="signupMessage" class="form-note">admin 또는 영업사원 링크를 통해 가입하면 해당 상위 하위 상조 회원으로 연결됩니다.</p>
        </form>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./signup.js"></script>
  </body>
</html>
