<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b99642" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MaRu Admin" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>로그인 | MaRu Partner Admin</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=9" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-visual" aria-label="파트너 계층 구조 미리보기">
        <div class="login-visual-copy">
          <p class="eyebrow">MaRu Partner Operations</p>
          <h2>상조 회원 유입부터 조직별 관리까지 한 화면에서 정리합니다.</h2>
          <div class="visual-stat-grid">
            <span>가입 링크</span>
            <span>조직 트리</span>
            <span>약관 동의</span>
          </div>
        </div>
        <div class="network-map">
          <span class="node node-admin">본사</span>
          <span class="node node-sales-a">팀장 A</span>
          <span class="node node-sales-b">팀장 B</span>
          <span class="node node-customer-a">상조회원</span>
          <span class="node node-customer-b">상조회원</span>
          <span class="node node-customer-c">상조회원</span>
          <span class="line line-a"></span>
          <span class="line line-b"></span>
          <span class="line line-c"></span>
          <span class="line line-d"></span>
          <span class="line line-e"></span>
        </div>
      </section>

      <section class="login-panel" aria-labelledby="loginTitle">
        <div class="brand-lockup">
          <div class="brand-mark"><img class="brand-logo" src="./icons/maru-logo.svg" alt="마루상조" /></div>
          <div>
            <p class="eyebrow">파트너 관리 시스템</p>
            <h1 id="loginTitle">MaRu Partner Admin</h1>
          </div>
        </div>

        <form id="loginForm" class="login-form">
          <label>
            아이디
            <input id="loginId" type="text" autocomplete="username" value="admin" required />
          </label>
          <label>
            비밀번호
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">로그인</button>
          <p id="loginMessage" class="form-note">관리자 계정으로 로그인하세요.</p>
          <a class="form-link" href="./register.html">팀장 회원가입</a>
        </form>

        <section id="installBox" class="install-box" hidden>
          <div>
            <strong>앱처럼 빠르게 접속하기</strong>
            <p id="installGuide">홈 화면에 설치하면 브라우저 주소 입력 없이 바로 열 수 있습니다.</p>
          </div>
          <button id="installAppButton" class="outline-button" type="button" hidden>홈 화면에 설치</button>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./config.js?v=9"></script>
    <script src="./api.js?v=9"></script>
    <script src="./login.js?v=9"></script>
    <script src="./install.js?v=9"></script>
  </body>
</html>
